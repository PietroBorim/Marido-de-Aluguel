<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ServiçoJusto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">⚡ Serviço<span>Justo</span></div>
  <div>
    <button onclick="mostrar('home')">Início</button>
    <button onclick="mostrar('buscar')">Buscar</button>
    <button onclick="mostrar('comparar')">Comparar</button>
  </div>
  <button class="btn-verde" onclick="abrirModal()">Cadastrar</button>
</nav>


<!-- PÁGINA: HOME -->
<div id="home" class="pagina ativa">

  <div class="hero">
    <h1>Contrate com <em>confiança</em>,<br>pague o <em>preço justo</em></h1>
    <p>Compare prestadores locais por preço, avaliação e distância.</p>
    <div class="busca">
      <input id="inputHome" placeholder="Ex: eletricista, pintor…"/>
      <button class="btn-verde" onclick="irBuscar()">Buscar</button>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="titulo-secao">Destaques da semana</h2>
    <div class="grade" id="gradeHome"></div>
  </div>

</div>


<!-- PÁGINA: BUSCAR -->
<div id="buscar" class="pagina">
  <div class="container py-5">
    <h2 class="titulo-secao">Buscar prestadores</h2>

    <!-- Filtros -->
    <div class="filtros">
      <input id="inputBusca" class="campo" placeholder="Buscar…" oninput="filtrar()"/>
      <select id="selectCategoria" class="campo" onchange="filtrar()">
        <option value="">Todas as categorias</option>
        <option>Elétrica</option>
        <option>Hidráulica</option>
        <option>Pintura</option>
        <option>Jardim</option>
      </select>
    </div>

    <!-- Ordenação -->
    <div class="ordenacao">
      <span>Ordenar:</span>
      <button id="btn-avaliacao" class="pill ativo" onclick="ordenar('avaliacao')">⭐ Avaliação</button>
      <button id="btn-preco"     class="pill"       onclick="ordenar('preco')">💰 Menor preço</button>
      <button id="btn-distancia" class="pill"       onclick="ordenar('distancia')">📍 Distância</button>
    </div>

    <div class="grade" id="gradeBusca"></div>
  </div>
</div>


<!-- PÁGINA: COMPARAR -->
<div id="comparar" class="pagina">
  <div class="container py-5">
    <h2 class="titulo-secao">Comparar prestadores</h2>
    <p id="avisoComparar" class="aviso">
      Marque até 3 prestadores em <strong>Buscar</strong> para comparar aqui.
    </p>
    <div class="grade" id="gradeComparar"></div>
  </div>
</div>


<!-- BARRA FLUTUANTE (aparece ao marcar prestadores) -->
<div id="tray" class="tray">
  <span id="trayTexto"></span>
  <div>
    <button onclick="limpar()">Limpar</button>
    <button class="btn-verde" onclick="mostrar('comparar')">Comparar →</button>
  </div>
</div>


<!-- MODAL DE CADASTRO -->
<div id="modal" class="modal-fundo" onclick="fecharModal(event)">
  <div class="modal-caixa">
    <h3>Criar conta</h3>
    <input class="campo" placeholder="Nome"/>
    <input class="campo" placeholder="E-mail" type="email"/>
    <input class="campo" placeholder="Senha"  type="password"/>
    <button class="btn-verde" onclick="fecharModal();toast('✅ Conta criada!')">Cadastrar</button>
  </div>
</div>


<!-- TOASTS -->
<div id="toasts"></div>


<script src="app.js"></script>
</body>
</html>
