<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Marido de Aluguel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════════════════════════════
     NAVBAR
     Barra de navegação fixa no topo.
     Os botões chamam mostrar('id') → app.js troca a página visível.
═══════════════════════════════════════ -->
<nav>
  <div class="logo">🔧 Marido de <span>Aluguel</span></div>
  <div>
    <button onclick="mostrar('home')">Início</button>
    <button onclick="mostrar('buscar')">Buscar</button>
    <button onclick="mostrar('comparar')">Comparar</button>
  </div>
  <button class="btn-verde" onclick="abrirModal()">Cadastrar</button>
</nav>


<!-- ═══════════════════════════════════════
     PÁGINA: HOME
     Primeira tela vista pelo usuário.
     O grid #gradeHome é preenchido por renderHome() no app.js.
═══════════════════════════════════════ -->
<div id="home" class="pagina ativa">

  <div class="hero">
    <h1>O profissional certo,<br>pelo <em>preço justo</em></h1>
    <p>Compare eletricistas, encanadores, pintores e muito mais — avaliações reais, sem achismo.</p>
    <div class="busca">
      <!-- oninput → liveSearch · onkeydown Enter → irBuscar() -->
      <input id="inputHome" placeholder="Ex: eletricista, encanador, pintor…"/>
      <button class="btn-verde" onclick="irBuscar()">Buscar</button>
    </div>
  </div>

  <div class="container py-5">
    <h2 class="titulo-secao">Destaques da semana</h2>
    <!-- preenchido por renderHome() → app.js -->
    <div class="grade" id="gradeHome"></div>
  </div>

</div>


<!-- ═══════════════════════════════════════
     PÁGINA: BUSCAR
     Filtros + ordenação + grade de resultados.
     filtrar() e ordenar() em app.js controlam o que aparece aqui.
═══════════════════════════════════════ -->
<div id="buscar" class="pagina">
  <div class="container py-5">
    <h2 class="titulo-secao">Buscar profissionais</h2>

    <!-- Filtros: texto e categoria -->
    <div class="filtros">
      <!-- oninput chama filtrar() a cada tecla digitada -->
      <input id="inputBusca" class="campo" placeholder="Buscar…" oninput="filtrar()"/>
      <!-- onchange chama filtrar() ao trocar a categoria -->
      <select id="selectCategoria" class="campo" onchange="filtrar()">
        <option value="">Todas as categorias</option>
        <option>Elétrica</option>
        <option>Hidráulica</option>
        <option>Pintura</option>
        <option>Jardim</option>
      </select>
    </div>

    <!-- Botões de ordenação: cada um chama ordenar('criterio') -->
    <div class="ordenacao">
      <span>Ordenar:</span>
      <button id="btn-avaliacao" class="pill ativo" onclick="ordenar('avaliacao')">⭐ Avaliação</button>
      <button id="btn-preco"     class="pill"       onclick="ordenar('preco')">💰 Menor preço</button>
      <button id="btn-distancia" class="pill"       onclick="ordenar('distancia')">📍 Distância</button>
    </div>

    <!-- Grade de resultados: preenchida por filtrar() → app.js -->
    <div class="grade" id="gradeBusca"></div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     PÁGINA: COMPARAR
     Exibe os prestadores selecionados lado a lado.
     renderComparar() em app.js monta o conteúdo aqui.
═══════════════════════════════════════ -->
<div id="comparar" class="pagina">
  <div class="container py-5">
    <h2 class="titulo-secao">Comparar profissionais</h2>
    <!-- Aviso exibido enquanto nenhum prestador estiver selecionado -->
    <p id="avisoComparar" class="aviso">
      Marque até 3 profissionais em <strong>Buscar</strong> para comparar aqui.
    </p>
    <!-- Grade de comparação: preenchida por renderComparar() → app.js -->
    <div class="grade" id="gradeComparar"></div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     BARRA FLUTUANTE DE COMPARAÇÃO (TRAY)
     Fica escondida abaixo da tela (CSS: translateY(100%)).
     Sobe quando JS adiciona a classe .visivel.
     Aparece ao marcar o primeiro checkbox de "Comparar".
═══════════════════════════════════════ -->
<div id="tray" class="tray">
  <span id="trayTexto"></span>
  <div>
    <button onclick="limpar()">Limpar</button>
    <button class="btn-verde" onclick="mostrar('comparar')">Comparar →</button>
  </div>
</div>


<!-- ═══════════════════════════════════════
     MODAL DE CADASTRO
     Invisível por padrão (opacity:0 no CSS).
     abrirModal() adiciona .aberto → fica visível.
     Fechar: clicar fora da caixa chama fecharModal(event).
═══════════════════════════════════════ -->
<div id="modal" class="modal-fundo" onclick="fecharModal(event)">
  <div class="modal-caixa">
    <h3>Criar conta</h3>
    <input class="campo" placeholder="Nome"/>
    <input class="campo" placeholder="E-mail" type="email"/>
    <input class="campo" placeholder="Senha"  type="password"/>
    <button class="btn-verde" onclick="fecharModal();toast('✅ Conta criada!')">Cadastrar</button>
  </div>
</div>


<!-- ═══════════════════════════════════════
     CONTAINER DE TOASTS
     toast('mensagem') em app.js cria divs aqui,
     que somem automaticamente após 3 segundos.
═══════════════════════════════════════ -->
<div id="toasts"></div>


<!-- Scripts carregados ao final para não travar o carregamento da página -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
